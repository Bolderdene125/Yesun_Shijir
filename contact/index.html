  <style>
    .branch-list{display:flex;flex-direction:column;gap:12px;}
    .branch-item{
      display:flex;align-items:center;gap:0;
      background:var(--bg-white);border:1px solid var(--border);
      border-radius:var(--radius-xl);overflow:hidden;
      border-left:4px solid transparent;
      transition:border-color .2s,box-shadow .2s;
    }
    .branch-item:hover{border-left-color:var(--primary);box-shadow:var(--shadow-md);}
    .branch-item.open-now{border-left-color:var(--primary);}

    .branch-main{flex:1;padding:18px 20px;min-width:0;}
    .branch-name{font-size:16px;font-weight:700;font-family:var(--font-head);margin-bottom:2px;}
    .branch-nick{font-size:11px;font-weight:700;font-family:var(--font-mono);letter-spacing:.06em;color:var(--primary);margin-bottom:10px;}
    .branch-rows{display:flex;flex-direction:column;gap:5px;}
    .branch-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text-muted);line-height:1.5;}
    .branch-row .material-symbols-outlined{font-size:14px;flex-shrink:0;margin-top:1px;color:var(--primary);}
    .open-badge{
      display:inline-block;font-size:10px;font-weight:700;font-family:var(--font-mono);
      padding:2px 8px;border-radius:99px;background:rgba(0,94,38,.1);color:var(--primary);
      border:1px solid rgba(0,94,38,.2);margin-left:8px;vertical-align:middle;
    }

    .branch-actions{display:flex;flex-direction:column;gap:8px;padding:18px 18px 18px 8px;flex-shrink:0;}
    .branch-btn{
      display:flex;align-items:center;gap:6px;
      padding:8px 14px;border-radius:var(--radius-md);
      font-size:12px;font-weight:700;font-family:var(--font-head);
      border:1.5px solid var(--border);background:transparent;
      color:var(--text-sec);cursor:pointer;transition:all .15s;
      white-space:nowrap;text-decoration:none;
    }
    .branch-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--bg-low);}
    .branch-btn .material-symbols-outlined{font-size:15px;}
  </style>
</head>

function isOpen(b){
  const now=new Date(); const day=now.getDay();
  const h=now.getHours(); const m=now.getMinutes();
  const [start,end]=(b.hours.split(', ')[1]||'').split('-').map(t=>{const[hh,mm]=t.split(':').map(Number);return hh*60+mm;});
  const cur=h*60+m;
  return b.workdays.includes(day) && cur>=start && cur<=end;
}

function render(){
  document.getElementById('branchList').innerHTML=BRANCHES.map((b,i)=>`
    <div class="branch-item${isOpen(b)?' open-now':''} animate-in" style="animation-delay:${i*.04}s">
      <div class="branch-main">
        <p class="branch-name">${b.name}${isOpen(b)?'<span class="open-badge">Нээлттэй</span>':''}</p>
        <p class="branch-nick">/ ${b.nick} /</p>
        <div class="branch-rows">
          <div class="branch-row"><span class="material-symbols-outlined">schedule</span>${b.hours}</div>
          <div class="branch-row"><span class="material-symbols-outlined">location_on</span>${b.addr}</div>
          <div class="branch-row"><span class="material-symbols-outlined">phone</span>${b.phone}</div>
        </div>
      </div>
      <div class="branch-actions">
        <a class="branch-btn" href="${b.mapUrl}" target="_blank" rel="noopener">
          <span class="material-symbols-outlined">map</span>Газрын зураг
        </a>
        <a class="branch-btn" href="tel:+976${b.phone.replace(/[^0-9]/g,'')}">
          <span class="material-symbols-outlined">phone</span>Залгах
        </a>
      </div>
    </div>
  `).join('');
}
render();
